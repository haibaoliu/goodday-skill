## 6. terminal — 终端执行环境

### What
控制 Agent 执行 Shell 命令的**运行环境**——本地直接执行还是容器隔离、超时、持久化 shell。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `backend` | 执行后端 | `local` / `docker` / `ssh` / `modal` / `daytona` / `singularity` / `vercel_sandbox` | `local` = 直接在宿主机执行（最快，无隔离）；`docker` = 容器隔离 |
| `cwd` | 工作目录 | `.` = 当前目录；绝对路径 | Agent 执行的所有命令从这里出发 |
| `timeout` | 命令超时（秒） | 默认 180，前景最大 600 | 防止命令挂死；超过 600 秒的用 `background=true` |
| `persistent_shell` | 同一会话内 shell 状态保留 | `true`/`false` | `true` = `cd`、`export`、`source venv` 在当前 session 中保留，直到 `lifetime_seconds` 过期 |
| `lifetime_seconds` | Shell 会话生命周期（秒） | 默认 300（5 分钟） | 过期后 shell 状态重置——你刚 `cd` 进去的目录就丢失了 |
| `env_passthrough` | 透传给子进程的环境变量名列表 | `["MY_TOKEN", "API_KEY"]` | 默认不传任何环境变量给子进程，安全考量 |
| `docker_run_as_host_user` | 容器内以宿主机 UID/GID 运行 | `true`/`false` | `false` = root 运行 → 输出文件归 root，宿主机无法操作 |

### Why
- **`persistent_shell + lifetime_seconds` 的组合是最常被忽略的**：你 `cd` 到项目目录，激活 venv，但 5 分钟后 shell 过期，下一条命令从错误目录执行
- **`docker_run_as_host_user: false`** 意味着容器内所有文件写操作产生的文件，在宿主机上属于 root，你需要 `sudo` 才能操作
- **`backend: docker`** 时，`read_file`/`write_file`/`search_files` 全部在容器内执行，路径是容器内路径

```yaml
terminal:
  backend: local
  cwd: .
  timeout: 180
  persistent_shell: true
  lifetime_seconds: 300
  docker_run_as_host_user: false
```

