## 10. file / tool_output — 文件与工具输出限制

### What
**硬限制**——Agent 读取文件和工具输出的上限，超过的直接截断。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `file_read_max_chars` | `read_file` 单次最大读取字符数 | 默认 100000 | 防止大文件撑爆 context window |
| `tool_output.max_bytes` | 工具输出最大字节数 | 默认 50000 | **工具返回值过大 → 截断**，可能丢失关键信息 |
| `tool_output.max_lines` | 工具输出最大行数 | 默认 2000 | 同上 |
| `tool_output.max_line_length` | 单行最大长度 | 默认 2000 | 超长行（如 base64）会被截断 |

### Why
- **这些限制是保护机制**：防止一个工具返回 10MB 的输出把 LLM context 撑爆
- **副作用**：如果你需要完整读取一个大文件，可能需要分段读（用 `offset`/`limit` 参数）

