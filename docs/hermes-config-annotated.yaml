## 2. providers / fallback / credential_pool

### What
**服务商降级链**和 **API key 池轮换**——主服务商挂了怎么办、多个 key 怎么分配负载。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `providers` | 覆盖内置服务商的 base_url | `{"openai": {"base_url": "https://my-proxy.com/v1"}}` | 当你用代理或私有部署时需要 |
| `fallback_providers` | 主服务商不可用时，按顺序尝试的降级列表 | `["openrouter", "anthropic"]` | 生产环境必须——DeepSeek 挂了自动切 OpenRouter，不需要人工干预 |
| `credential_pool_strategies` | 多 API key 的轮换策略 | `{"openrouter": "round_robin"}` | 多个 key 分摊 rate limit，避免单个 key 触发限流 |

### Why
- **不设 fallback**：主服务商宕机 → Agent 完全不可用
- **不用 credential pool**：单个 key 的 rate limit 就是你的上限
- **`providers` 不写也行**：内置服务商有默认 base_url

```yaml
providers: {}
fallback_providers: []
credential_pool_strategies: {}
```

---

## 3. custom_providers — 自定义服务商

### What
对接**非内置**的 API 服务——私有部署的 vLLM、反向代理、国内 API 等。

### How
```yaml
custom_providers:
  - name: my-vllm               # ← model.provider 必须匹配这个
    base_url: http://192.168.1.100:8000/v1
    model: qwen2.5-72b
```
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `name` | 服务商标识符 | 任意字符串，必须和 `model.provider` 完全一致 | **匹配不上 = 报错 unknown provider** |
| `base_url` | API 端点 | `http://host:port/v1` 格式 | 指向你的代理或私有部署 |
| `model` | 该服务商的默认模型 | 模型名 | 当 `model.default` 为空时使用 |

### Why
- **最常踩的坑**：`model.provider` 写 `deepseek`（内置），又在 `custom_providers` 里定义一个 `name: deepseek` → 冲突，因为内置已经有一个 deepseek
- **解决**：自定义的用不同名字，如 `name: my-deepseek-proxy`

```yaml
custom_providers:
  - name: Api.deepseek.com
    base_url: https://api.deepseek.com
    model: deepseek-v4-pro
```

