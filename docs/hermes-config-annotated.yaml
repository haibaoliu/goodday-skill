## 15. bedrock — AWS Bedrock

### What
AWS Bedrock 服务商配置——区域、自动模型发现、Guardrails。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `region` | AWS 区域 | 空 = 自动检测 | Bedrock 模型在不同区域可用性不同 |
| `discovery.enabled` | 自动发现可用模型 | `true`/`false` | 开启后自动列出你账号下有权限的模型 |
| `discovery.refresh_interval` | 刷新间隔（秒） | 默认 3600 | 每小时刷新模型列表 |

```yaml
bedrock:
  region: ''
  discovery:
    enabled: true
    refresh_interval: 3600
```

