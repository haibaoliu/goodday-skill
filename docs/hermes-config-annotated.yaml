## 23. voice — 语音 (TTS + STT)

### What
**文字转语音**（TTS，Agent 说话）和**语音转文字**（STT，你说话）。

### How — TTS
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `tts.provider` | TTS 服务商 | `edge`（免费）/ `elevenlabs` / `openai` / `mistral` / `neutts`（本地）/ `piper`（本地） | `edge` 免费但声音选择少；`elevenlabs` 质量最高但要 API key |
| `tts.edge.voice` | Edge TTS 语音 | `en-US-AriaNeural` 等 | 微软 Edge TTS 支持多种语言和声音 |

### How — STT
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `stt.provider` | STT 服务商 | `local`（faster-whisper 免费）/ `openai` / `mistral` | `local` 免费跑在本地；`openai` 更准但要 API key |
| `stt.local.model` | 本地模型大小 | `tiny` / `base` / `small` / `medium` / `large-v3` | 越大越准但越慢/吃内存 |

```yaml
tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural

stt:
  enabled: true
  provider: local
  local:
    model: base

voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
```

