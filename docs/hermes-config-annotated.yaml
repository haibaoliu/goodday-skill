## 43. 其他

| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `timezone` | 时区 | 空 = 自动检测 | 影响 cron 和 scheduled 任务 |
| `prefill_messages_file` | 预填充消息文件 | 文件路径 | **每次对话开始都注入**——不要放敏感信息 |
| `_config_version` | 内部版本号 | **不要手动修改** | Hermes 用这个判断配置格式 |

```yaml
timezone: ''
prefill_messages_file: ''
_config_version: 23
```

