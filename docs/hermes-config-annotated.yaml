## 7. web — 搜索与内容提取

### What
Agent 的 `web_search` 和 `web_extract` 工具用**哪个搜索引擎**和**哪个内容提取器**。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `backend` | 搜索引擎 | `""`（auto）/ `google` / `bing` / `duckduckgo` / `tavily` / `searxng` | auto = 有 API key 的优先；留空不设 = 自动选择 |
| `extract_backend` | 网页内容提取器 | `""`（auto）/ `trafilatura` / `readability` / `browser` | 不同提取器对中文/JS 渲染页面的效果差异很大 |

### Why
- **不设置**：Hermes 自动选择可用后端，大多数情况够用
- **在中国大陆**：Google/Bing 可能被墙，`duckduckgo` 或自建 `searxng` 更可靠

```yaml
web:
  backend: ''
  extract_backend: ''
```

