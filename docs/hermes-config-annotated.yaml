## 32. kanban — 多 Agent 协作看板

```yaml
kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 60
  failure_limit: 2              # 连续失败 N 次后 block
```

---

## 33. code_execution — Python 沙箱

### What
`execute_code` 工具的执行环境和限制。

| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `mode` | 执行模式 | `project`（项目目录，可访问依赖）/ `sandbox`（隔离） | `project` = 可以用 pandas 等已安装的库 |
| `timeout` | 超时（秒） | 默认 300（5 分钟） | Python 脚本最多跑 5 分钟 |
| `max_tool_calls` | 单次脚本最多调用多少次工具 | 默认 50 | 防止循环调用 |

```yaml
code_execution:
  mode: project
  timeout: 300
  max_tool_calls: 50
```

---

## 34. logging — 日志

```yaml
logging:
  level: INFO                    # DEBUG|INFO|WARNING|ERROR
  max_size_mb: 5                 # 单文件最大 MB
  backup_count: 3                # 保留旧文件数（轮转）
```

