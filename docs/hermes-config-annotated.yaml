## 4. toolsets / platform_toolsets

### What
控制 Agent **能使用哪些工具**。`toolsets` 是全局默认，`platform_toolsets` 按平台覆盖。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `toolsets` | 全局启用的工具集列表 | `["hermes-cli"]` — 用 `hermes tools list` 查看可用列表 | CLI 模式核心工具在此；不加则 Agent 没有终端/文件/搜索能力 |
| `platform_toolsets` | 按平台（cli/telegram/discord/weixin 等）分配不同的工具集组合 | `{cli: [hermes-cli], telegram: [hermes-telegram]}` | **安全边界**：WeChat bot 不应该有 `terminal` 权限；CLI 可以全功能 |

### Why
- **安全隔离**：你可以在 CLI 上用全部工具，但微信 bot 只给搜索和消息工具
- **`toolsets` 没加工具集** → Agent 无法做任何实际操作，只能聊天

```yaml
toolsets:
  - hermes-cli

platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram]
  weixin: [hermes-weixin]
```

---

## 5. agent — Agent 核心行为

### What
Agent 运行时的核心参数——最大轮次、超时、重试、推理强度、内置人格。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `max_turns` | 每轮对话最大 tool-calling 迭代次数 | 整数，默认 90 | **防止死循环**：Agent 调用工具失败 → 重试 → 再失败时，这是最终的上限。设太大会浪费 token；设太小复杂任务完不成 |
| `gateway_timeout` | Gateway 模式下单个请求总超时（秒） | 整数，默认 1800（30 分钟） | Gateway 长时间无响应 = 请求被丢弃 |
| `api_max_retries` | API 调用失败后最大重试次数 | 整数，默认 3，指数退避 | 网络抖动时自动恢复；设为 0 = 一次失败就放弃 |
| `tool_use_enforcement` | 强制工具调用策略 | `auto`（推荐）/ `on`（强制）/ `off`（禁止） | `auto` = 模型自己决定；`on` = 每轮必须调工具（调试用）；`off` = 纯聊天模式 |
| `image_input_mode` | 图片输入模式 | `auto`/`off` | `auto` = vision 模型自动接收图片；`off` = 始终用文本描述替代（省钱） |
| `reasoning_effort` | 推理强度 | `none`/`minimal`/`low`/`medium`/`high`/`xhigh` | 仅对支持此参数的模型生效（OpenAI o-series、DeepSeek-R1） |
| `verbose` | CLI 详细模式 | `true`/`false` | 开启后显示更多调试信息 |

### Why
- **`max_turns: 90`** 对复杂多步任务足够；如果经常耗尽，先检查是不是有死循环而不是盲目加大
- **`gateway_timeout: 1800`** 看似很长，但子代理任务可能超过这个时间，需要配合 `delegation.child_timeout_seconds` 使用
- **`tool_use_enforcement: on`** 会导致简单问候也强行调工具

```yaml
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  tool_use_enforcement: auto
  image_input_mode: auto
  reasoning_effort: medium
  verbose: false
```

### 内置人格 (personalities)
Agent 内置了 13 种预设人格，用 `/personality <name>` 切换：
`helpful` / `concise` / `technical` / `creative` / `teacher` / `kawaii` / `catgirl` / `pirate` / `shakespeare` / `surfer` / `noir` / `uwu` / `philosopher` / `hype`

