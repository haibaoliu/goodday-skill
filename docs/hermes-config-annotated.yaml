## 1. model — 模型/服务商

### What
决定 Hermes 使用**哪个模型**（model name）和**哪个 API 服务商**（provider）。所有 LLM 调用都从这里出发。

### How
```yaml
model:
  default: deepseek-v4-pro       # 模型名
  provider: deepseek             # 服务商标识
  base_url: https://api.deepseek.com/v1  # API 端点
```
| 配置项 | What（是什么） | How（怎么配） | Why（为什么需要） |
|--------|---------------|--------------|-------------------|
| `default` | 默认使用的模型名称 | `hermes config set model.default "deepseek-v4-pro"` 或用 `hermes model` 交互选择 | Hermes 启动时从这里读模型名发给 API。空字符串会让 Hermes 自动探测，但可能不准 |
| `provider` | 服务商标识符 | 内置名如 `deepseek`/`openrouter`/`anthropic`/`openai`/`google`；自定义的需匹配 `custom_providers[].name` | 决定用哪个 API 端点、哪种 auth 方式。内置服务商自动处理 base_url，自定义服务商需要在 `custom_providers` 中声明 |
| `base_url` | API 端点 URL | 字符串，内置服务商可不写 | 仅对非内置服务商生效。内置的 deepseek/openrouter 等会自动解析端点 |

### Why
- **换模型只需改一行**：`model.default` 切换即可，Hermes 会为新模型自动适配 prompt 格式
- **换服务商也只需一行**：`model.provider` 切换 API 来源
- **如果 `provider` 和 `custom_providers[].name` 不匹配** → Agent 报错 "unknown provider"
- **如果 `base_url` 写错了** → 所有 API 调用返回连接错误

```yaml
model:
  default: deepseek-v4-pro
  provider: deepseek
  base_url: https://api.deepseek.com/v1
```

