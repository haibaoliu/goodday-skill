## 26. memory — 持久化记忆

### What
Agent 的**长期记忆系统**——跨 session 记住你的偏好、环境信息、经验教训。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `memory_enabled` | 是否启用 MEMORY.md（Agent 个人笔记） | `true`/`false` | `false` = Agent 不主动记东西 |
| `user_profile_enabled` | 是否启用 USER.md（用户画像） | `true`/`false` | `false` = Agent 不记录你的信息 |
| `memory_char_limit` | MEMORY.md 字符上限 | 默认 2200 | **这是字符数不是 token 数**——跨模型一致 |
| `user_char_limit` | USER.md 字符上限 | 默认 1375 | 同上 |
| `provider` | 外部 memory provider | `honcho` / `mem0` / `supermemory` / `hindsight` | 留空 = 仅用内置文件级 memory |
| `nudge_interval` | 后台 memory review 间隔（轮） | 默认 10 | 每 10 轮 tool-calling 后自动检查是否有新记忆 |
| `flush_min_turns` | 最少累计轮数后才写入 | 默认 6 | 防止太频繁写磁盘 |

### Why
- **写入 Memory 后当前 session 不立即生效**：Hermes 用 Frozen Snapshot 模式——启动时拍快照注入 system prompt，mid-session 写入对新消息不可见
- **Memory 是持久化攻击面**：如果有恶意 prompt injection 污染了 Memory，所有未来 session 都受影响
- **两个文件的位置**：`~/.hermes/memories/MEMORY.md` 和 `~/.hermes/memories/USER.md`，可以手动编辑，用 `§` 分隔条目

```yaml
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  provider: ''
  nudge_interval: 10
  flush_min_turns: 6
```

---

## 27. delegation — 子代理

### What
`delegate_task` 创建的子代理的**运行参数**——模型、超时、并发数、嵌套深度。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `model` / `provider` / `base_url` | 子代理的模型和服务商 | 空 = 继承主模型 | 子代理可以用更便宜的模型 |
| `max_iterations` | 子代理最大 tool-calling 轮数 | 默认 50 | 独立于主 agent 的 `max_turns: 90` |
| `child_timeout_seconds` | 子代理超时（秒） | 默认 600（10 分钟） | 超时后返回已有结果 |
| `max_concurrent_children` | 最多并行子代理数 | 默认 3 | batch 模式下同时跑几个 |
| `max_spawn_depth` | 最大嵌套深度 | `0` = 禁止嵌套；`1` = 可再 delegate 一层 | 防止无限递归 |
| `subagent_auto_approve` | 是否自动审批子代理的危险命令 | `true`/`false` | `false` = 子代理遇到 `rm` 等直接拒绝 |

### Why
- **子代理超时或耗尽迭代不会让主 agent 崩溃**——返回已有结果
- **`subagent_auto_approve: false`** 是最安全的设置，但也意味着子代理无法执行危险命令
- **子代理的 `max_iterations: 50` + 主 agent 的 `max_turns: 90`**：两个独立限制

```yaml
delegation:
  model: ''
  provider: ''
  max_iterations: 50
  child_timeout_seconds: 600
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: true
  subagent_auto_approve: false
```

