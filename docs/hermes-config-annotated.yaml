## 24. human_delay — 模拟打字延迟

### What
在 Agent 文字输出中加入**随机延迟**，模拟人类打字速度。纯视觉体验。

| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `mode` | 模式 | `off` / `fixed` / `random` | `off` = 瞬间输出；`random` = 随机延迟 |
| `min_ms` / `max_ms` | 延迟范围（毫秒） | 800–2500 | 人类打字大概这个速度 |

```yaml
human_delay:
  mode: 'off'
  min_ms: 800
  max_ms: 2500
```

### Why
- **`mode: 'off'` 是全局的**：即使 `display.streaming: true`，关了这个也没有打字机效果
- 纯粹本地行为，不影响 API 调用

