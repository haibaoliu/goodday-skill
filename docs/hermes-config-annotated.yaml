## 9. checkpoints — 文件系统快照

### What
开启后 Agent 可以创建文件系统快照，支持 `/rollback` 回滚。**类似 Git 但作用于工作目录的所有文件。**

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `enabled` | 是否启用 | `true`/`false` | **默认 `false`**！不开启则 `/rollback` 不可用 |
| `max_snapshots` | 最多保留快照数 | 默认 20 | 超出自动删除最旧的 |
| `max_total_size_mb` | 快照总大小上限 | 默认 500 MB | 防止快照吃光磁盘 |
| `max_file_size_mb` | 单个文件最大备份大小 | 默认 10 MB | 大文件（模型、数据库）不备份 |
| `retention_days` | 快照保留天数 | 默认 7 | 超过自动清理 |
| `min_interval_hours` | 两次快照最小间隔 | 默认 24 小时 | 防止每个操作都拍快照 |

### Why
- **`enabled: false` 是默认**：大部分用户不需要回滚，快照会消耗磁盘
- **开启后**：每次文件修改前可自动拍快照，出问题 `/rollback` 恢复

```yaml
checkpoints:
  enabled: false
  max_snapshots: 20
  max_total_size_mb: 500
  retention_days: 7
```

