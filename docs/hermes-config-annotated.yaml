## 16. auxiliary — 辅助模型

### What
**9 个后台任务**各自独立配置模型——vision 看图、compression 摘要、session_search 会话搜索等等。这些任务**不经过主模型 context**，不影响主模型 token 消耗。

### How
每个辅助任务都有相同的配置结构：
```yaml
auxiliary:
  <task_name>:
    provider: auto            # 服务商；auto = 自动选择
    model: ''                 # 模型名；空 = 继承
    base_url: ''              # ⚠️ 空字符串会覆盖 .env！
    api_key: ''               # ⚠️ 空字符串会覆盖 .env！
    timeout: 120
    extra_body: {}
```

### Why — 最重要的三个坑

#### 🔴 空字符串 ≠ 未设置
```yaml
# ❌ 这等于告诉 Hermes「用空 key」
auxiliary:
  vision:
    api_key: ''

# ✅ 不写 api_key，让系统从 .env 自动读取
auxiliary:
  vision:
    provider: alibaba
    model: qwen-vl-max
    # api_key 不写 = 从 DASHSCOPE_API_KEY 读取
```

#### 🔴 Vision 的 `base_url` 在非 custom provider 下被代码丢弃
对于 `provider: alibaba`（非 `custom`），Hermes 会用内置注册表中的默认地址，**忽略你写的 `base_url`**。如果你的 API key 只在中国端点有效，用 `provider: custom:alibaba` + custom_providers 解决。

#### 🟡 所有 9 个辅助任务都有这个陷阱
vision、compression、session_search、skills_hub、approval、mcp、title_generation、triage_specifier、curator——它们的 `api_key: ''` 都会覆盖 `.env`。

### 各任务说明

| 任务 | 用途 | 推荐 provider |
|------|------|--------------|
| `vision` | `vision_analyze` 看图 | 你的眼睛模型（如 alibaba/qwen-vl-max）|
| `web_extract` | 网页内容提取 | auto 即可 |
| `compression` | 上下文压缩摘要 | 便宜模型即可（压缩质量要求不高）|
| `session_search` | 会话搜索结果摘要 | auto |
| `skills_hub` | 技能中心搜索 | auto |
| `approval` | smart 模式下的命令风险评估 | auto |
| `mcp` | MCP 工具相关 | auto |
| `title_generation` | 会话标题生成 | auto |
| `triage_specifier` | 问题分类 | auto |
| `curator` | 后台技能维护 | auto |

