## 17. display — 显示与 UI

### What
CLI/TUI 的**全部显示行为**——流式输出、紧凑模式、进度条、时间戳、颜色主题。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `streaming` | CLI 是否流式输出 | `true`/`false` | **注意**：这个和 `streaming.enabled` 是两个独立开关！后者是全局的 |
| `compact` | 紧凑模式（减少空行） | `true`/`false` | 信息密度更高 |
| `personality` | 默认人格 | `kawaii` / `concise` / `technical` 等 | 对应 `agent.personalities` 中的键名 |
| `busy_input_mode` | Agent 忙碌时按 Enter 的行为 | `interrupt` / `queue` / `steer` / `status` | `interrupt` = 打断；`queue` = 排队 |
| `show_reasoning` | 显示模型推理过程 | `true`/`false` | 对 DeepSeek-R1 等推理模型有意义 |
| `tool_progress` | 工具执行进度显示 | `all` / `command` / `off` | `all` = 显示所有工具调用详情 |
| `final_response_markdown` | 最终回复的 Markdown 处理 | `strip` / `render` / `raw` | `strip` = 纯文本；`render` = Rich 渲染 |
| `skin` | TUI 皮肤 | `default` / `minimal` / `retro` / `cyberpunk` | 纯视觉偏好 |
| `language` | 界面语言 | `en` / `zh` / `ja` | 影响 TUI 文字和提示 |
| `background_process_notifications` | 后台进程完成通知 | `all` / `tagged` / `off` | `tagged` = 仅 `notify_on_complete=true` 的通知 |
| `bell_on_complete` | 任务完成响铃 | `true`/`false` | 终端响铃通知 |
| `timestamps` | 显示时间戳 | `true`/`false` | 每条消息前显示时间 |
| `show_cost` | 显示 API 调用费用 | `true`/`false` | 仅 OpenRouter 等有价格数据的服务商有效 |

### Why — 关键区分

#### `display.streaming` vs `streaming.enabled`
```yaml
# 这两个是独立的！前者是 UI 层，后者是 API 层
display:
  streaming: true          # UI 显示流式效果

streaming:
  enabled: false           # API 非流式，上面 display 开也没用
```
**全局 `streaming.enabled: false` 会覆盖 `display.streaming`。**

```yaml
display:
  compact: false
  personality: kawaii
  streaming: true
  busy_input_mode: interrupt
  show_reasoning: false
  tool_progress: all
  final_response_markdown: strip
  language: en
  background_process_notifications: all
```

