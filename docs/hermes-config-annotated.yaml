## 30. curator — 技能生命周期管理

### What
自动审查、标记 stale、归档技能。后台运行。

| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `enabled` | 是否启用 | `true`/`false` | 关闭则技能不会自动维护 |
| `interval_hours` | 审查间隔 | 默认 168（每周） | 太频繁浪费 token；太罕见技能腐化 |
| `stale_after_days` | 多少天未使用标记为 stale | 默认 30 | stale 后提醒但不删除 |
| `archive_after_days` | stale 后多少天归档 | 默认 90 | 归档 = 移出活跃技能列表 |
| `backup.enabled` | 每次审查前备份 | `true`/`false` | 防止审查逻辑错误删掉有用的技能 |

```yaml
curator:
  enabled: true
  interval_hours: 168
  stale_after_days: 30
  archive_after_days: 90
  backup:
    enabled: true
    keep: 5
```

