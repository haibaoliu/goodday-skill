## 8. browser — 浏览器自动化

### What
Agent 的 `browser_navigate`/`browser_click`/`browser_snapshot` 等浏览器工具的行为控制。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `inactivity_timeout` | 页面无交互后自动关闭时间（秒） | 默认 120 | 防止浏览器进程泄漏 |
| `command_timeout` | 单个浏览器命令超时（秒） | 默认 30 | 页面加载慢时可能需要调大 |
| `allow_private_urls` | 是否允许访问 localhost/内网 IP | `true`/`false` | **安全关键**：`true` 意味着 Agent 可以访问你的本地服务 |
| `auto_local_for_private_urls` | 遇私有 URL 自动切到本地 Chromium | `true`/`false` | 配合 `allow_private_urls` 使用 |
| `cdp_url` | Chrome DevTools Protocol 连接 URL | 留空 = 自动管理 | 如果你有运行中的 Chrome 实例可以复用 |
| `dialog_policy` | 浏览器弹窗处理 | `must_respond` / `auto_dismiss` | `auto_dismiss` = 自动关闭 alert/confirm/prompt |

### Why
- **`allow_private_urls: false` 是默认安全设置**：防止 Agent 扫描你的内网
- **但这也意味着**：如果你想让 Agent 测试本地开发的应用，需要开启

```yaml
browser:
  inactivity_timeout: 120
  command_timeout: 30
  allow_private_urls: false
  auto_local_for_private_urls: true
  dialog_policy: must_respond
```

