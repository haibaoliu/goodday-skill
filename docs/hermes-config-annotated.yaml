## 41. 消息平台配置

### Slack
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `require_mention` | 是否需要 @mention | `true`/`false` | `false` = 所有消息都响应 |
| `allowed_channels` | 白名单频道 | 逗号分隔 | 空 = 所有频道 |

### Discord
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `require_mention` | 是否需要 @mention | `true`/`false` | — |
| `auto_thread` | 自动创建 thread | `true`/`false` | 把对话隔离到 thread 中 |
| `reactions` | 是否添加 emoji | `true`/`false` | Agent 回复上加 emoji 反应 |

### Telegram
```yaml
telegram:
  reactions: false
  allowed_chats: ''             # 白名单 ID
```

### Matrix / Mattermost / WhatsApp
类似的 `require_mention` + `allowed_*` 模式。

