## 19. privacy / security — 隐私与安全

### What
保护你的**隐私数据**和**系统安全**——PII 脱敏、secret 屏蔽、命令安全扫描。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `privacy.redact_pii` | Gateway 模式脱敏 PII | `true`/`false` | 哈希用户 ID、去除手机号 |
| `security.redact_secrets` | 工具输出中屏蔽疑似密钥 | `true`/`false` | 基于正则匹配 API key、token 模式并替换为 `[REDACTED]` |
| `security.tirith_enabled` | 启用 Tirith 命令安全扫描 | `true`/`false` | 每个 shell 命令执行前调用 tirith 检查风险 |
| `security.tirith_fail_open` | Tirith 扫描失败时的行为 | `true` = 放行；`false` = 拒绝 | **没装 tirith 时设 `false` 会拒绝所有命令！** |
| `security.website_blocklist` | 网站黑名单 | 域名字符串列表 | 禁止访问特定域名的工具 |

### Why
- **`redact_secrets: true` 后重启才生效**——当前 session 不变（防止 LLM 在运行中关掉自己的安全开关）
- **`tirith_enabled: true` 但没装 tirith**：`tirith_fail_open: true` 时无影响（扫描失败放行）；`false` 时所有命令被拒绝
- **`website_blocklist` 可以防止 Agent 访问恶意网站或有安全风险的内部服务**

```yaml
privacy:
  redact_pii: false

security:
  redact_secrets: true
  tirith_enabled: true
  tirith_fail_open: true
  website_blocklist:
    enabled: false
    domains: []
```

---

## 20. approvals — 命令审批

### What
**危险命令执行前是否需要人类确认**——`rm -rf`、`git push --force` 等。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `mode` | 审批策略 | `manual`（弹出确认）/ `smart`（AI 自动评估）/ `off`（= yolo） | `manual` = 最安全；`smart` = 低风险自动放行；`off` = 完全跳过 |
| `timeout` | 审批超时（秒） | 默认 60 | 超时自动拒绝 |
| `cron_mode` | Cron job 模式下的审批 | `deny` / `auto` / `ask` | Cron 没有人可以确认，所以 `deny` = 拒绝危险命令；`auto` = 自动放行 |
| `mcp_reload_confirm` | MCP 重载确认 | `true`/`false` | 是否每次重载 MCP 服务都要确认 |

### Why
- **`mode: smart`** 用 `auxiliary.approval` 指定的模型评估风险——模型质量影响评估准确性
- **`cron_mode: deny`** 是最安全的——cron 任务没人审批，遇到危险命令直接拒绝
- **子代理默认没有审批**：`delegation.subagent_auto_approve: false` 意味着子代理的危险命令直接拒绝

```yaml
approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
```

