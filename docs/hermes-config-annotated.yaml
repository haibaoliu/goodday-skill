## 35. model_catalog — 模型目录

### What
从远程 URL 拉取模型列表和元数据（价格、context window 等）。

```yaml
model_catalog:
  enabled: true
  url: https://hermes-agent.nousresearch.com/docs/api/model-catalog.json
  ttl_hours: 24                  # 缓存 24 小时
```

---

## 36. network — 网络

```yaml
network:
  force_ipv4: false              # 某些环境 IPv6 有问题时开启
```

---

## 37. sessions — 会话管理

| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `auto_prune` | 自动清理旧会话 | `true`/`false` | 默认 `false`——会话会一直保留 |
| `retention_days` | 保留天数 | 默认 90 | 超过自动删除 |
| `vacuum_after_prune` | 清理后 VACUUM | `true`/`false` | 回收 SQLite 空间 |

```yaml
sessions:
  auto_prune: false
  retention_days: 90
  vacuum_after_prune: true
  min_interval_hours: 24
```

---

## 38. session_reset — 会话自动重置

### What
长时间空闲后**自动重置 Agent 的 context/memory 状态**。

| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `mode` | 重置模式 | `memory_only` / `full` / `both` | `full` = 完全重置；`memory_only` = 仅重置记忆上下文 |
| `idle_minutes` | 空闲分钟后触发 | 默认 1440（24 小时） | 一天没说话就重置 |
| `at_hour` | 每天固定时间重置（UTC） | 默认 4（北京时间 12:00） | 对 Gateway 常驻 session 有用 |

```yaml
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
```

---

## 39. streaming — 流式输出全局开关

### What
**API 层面的流式开关**。与 `display.streaming`（UI 层）独立。

```yaml
streaming:
  enabled: false               # false = 非流式，等完整回复
```

### Why
- **这是真正的全局开关**：`false` 时 API 请求不加 `stream: true`，即使 `display.streaming: true` 也无效
- **非流式更快**但用户要等完整回复才能看到第一个字
- **流式体验好**但 token 间有网络延迟

---

## 40. updates — 更新策略

```yaml
updates:
  pre_update_backup: false       # 更新前备份
  backup_keep: 5                 # 保留最近 N 个备份
```

