Skill（技能）的**加载、执行、安全护栏**。

| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `external_dirs` | 额外技能目录 | 绝对路径列表 | 除了 `~/.hermes/skills/` 之外加载别处的技能 |
| `template_vars` | SKILL.md 中支持 `{{var}}` 模板变量 | `true`/`false` | 开启后技能内容可以用变量动态替换 |
| `inline_shell` | 允许技能内联执行 shell | `true`/`false` | **默认 `false`（安全）**——防止恶意技能执行命令 |
| `guard_agent_created` | 审查 Agent 创建的新技能 | `true`/`false` | 防止 Agent 创建恶意技能 |
| `creation_nudge_interval` | 技能创建提醒间隔（轮） | 默认 15 | 每 15 轮提醒保存学到的新技能 |

