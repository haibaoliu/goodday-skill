## 11. tool_loop_guardrails — 工具循环护栏

### What
**反死循环机制**——Agent 反复调同一个工具且每次都失败时，自动警告或强制停止。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `warnings_enabled` | 是否启用警告 | `true`/`false` | 默认 `true` —— 在终端打印警告 |
| `hard_stop_enabled` | 是否启用硬停止 | `true`/`false` | **默认 `false`**！只警告不阻止；开启后才真正强制结束 |
| `warn_after.exact_failure` | 完全相同失败重复 N 次后警告 | 默认 2 | 同一参数同一错误重复调用 = 明显死循环 |
| `hard_stop_after.exact_failure` | 硬停止阈值 | 默认 5 | 5 次完全相同的失败 = 强制结束本轮 |

### Why
- **`hard_stop_enabled: false` 意味着**：Agent 可能一直重复失败直到 `max_turns: 90` 耗尽
- **建议**：生产环境开启 `hard_stop_enabled: true` 来省 token

```yaml
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5
```

---

## 12. compression — 上下文压缩

### What
当对话 token 使用率达到阈值时，**自动将旧消息压缩为摘要**，防止超出模型 context window。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `enabled` | 是否启用 | `true`/`false` | **默认 `true`**。不开则长对话会在 context 满时直接截断旧消息 |
| `threshold` | 触发压缩的 token 使用率 | 0.5 = 50% | 50% 就开始压缩，留足余量 |
| `target_ratio` | 压缩后目标大小比例 | 0.2 = 压缩到 20% | 压缩越激进信息损失越多，但省 token |
| `protect_last_n` | 保护最后 N 条消息不被压缩 | 默认 20 | 保证最近的对话上下文不丢失 |
| `hygiene_hard_message_limit` | 消息数硬上限 | 默认 400 | 超过 400 条消息强制压缩，不管 threshold |

### Why
- **不开启压缩**：长对话直接截断（FIFO），可能丢失重要上下文
- **开启压缩**：用 `auxiliary.compression` 指定的模型做摘要——这个模型的选择影响摘要质量

---

## 13. prompt_caching — 提示词缓存

### What
为支持 prompt caching 的模型（**仅 Anthropic 原生 API 和 OpenRouter**）自动注入 `cache_control` 断点。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `cache_ttl` | 缓存 TTL | `5m` / `10m` 等（Anthropic 格式） | Anthropic 缓存命中可省 90% 的 prompt token 费用 |

### Why
- **仅 Anthropic/OpenRouter 有效**——DeepSeek、OpenAI 不认这个参数
- **与 compression 共存**：compression 压缩旧消息 → 新 system prompt + 摘要 → Anthropic 重建缓存

```yaml
prompt_caching:
  cache_ttl: 5m
```

---

## 14. openrouter — OpenRouter 特有

### What
OpenRouter 服务商的专属优化——响应缓存和模型筛选。

### How
| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `response_cache` | OpenRouter 响应缓存 | `true`/`false` | 相同 prompt 直接返回缓存，省钱 |
| `response_cache_ttl` | 缓存 TTL（秒） | 默认 300 | 5 分钟内相同请求走缓存 |
| `min_coding_score` | 代码能力最低评分 | 0-1，默认 0.65 | 自动选择模型时，低于此分数的跳过 |

```yaml
openrouter:
  response_cache: true
  response_cache_ttl: 300
  min_coding_score: 0.65
```

