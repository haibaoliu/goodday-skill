## 21. command_allowlist / hooks

### What
**命令白名单**和 **Shell 钩子**——预设哪些模式免审批，以及自动执行脚本。

| 配置项 | What | How | Why |
|--------|------|-----|-----|
| `command_allowlist` | 免审批的命令模式（自然语言描述） | 字符串列表 | 匹配的命令跳过 `approvals` 检查 |
| `quick_commands` | 快捷别名 | `{"gc": "git commit -m"}` | 缩写常用命令 |
| `hooks` | Shell 钩子 | `{"pre_cmd": "echo running"}` | 在命令前后自动执行脚本 |
| `hooks_auto_accept` | 自动接受新钩子 | `true`/`false` | `false` = 新钩子需要确认（安全） |

```yaml
command_allowlist:
  - overwrite project env/config via redirection
  - script execution via -e/-c flag
quick_commands: {}
hooks: {}
hooks_auto_accept: false
```

